{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <h2 class="mb-4">Nueva ruta</h2>
        <form method="POST">
            <div class="mb-3">
                <label class="form-label">Tipo de actividad</label>
                <select name="tipo" class="form-select" required>
                    <option value="">Selecciona...</option>
                    <option value="running">Running</option>
                    <option value="ciclismo">Ciclismo</option>
                </select>
            </div>
            <div class="mb-3">
                <label class="form-label">Distancia (km)</label>
                <input type="number" name="distancia_km" class="form-control" step="0.1" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Duración (minutos)</label>
                <input type="number" name="duracion_min" class="form-control" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Notas</label>
                <textarea name="notas" class="form-control" rows="3" placeholder="Notas opcionales..."></textarea>
            </div>
            <button type="submit" class="btn btn-dark w-100">Guardar ruta</button>
        </form>
    </div>
</div>
{% endblock %}
