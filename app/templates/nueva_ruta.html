{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="mb-4">
            <h2 class="mb-1">Nueva ruta</h2>
            <p class="text-muted mb-0" style="font-size:14px">Registra tu actividad de hoy</p>
        </div>

        <div class="card p-4">
            <form method="POST">
                <div class="mb-3">
                    <label class="form-label">Tipo de actividad</label>
                    <select name="tipo" class="form-select" required>
                        <option value="">Selecciona...</option>
                        <option value="running">🏃 Running</option>
                        <option value="ciclismo">🚴 Ciclismo</option>
                    </select>
                </div>
                <div class="mb-3">
                    <label class="form-label">Distancia (km)</label>
                    <input type="number" name="distancia_km" class="form-control" placeholder="Ej: 5.5" step="0.1" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Duración (minutos)</label>
                    <input type="number" name="duracion_min" class="form-control" placeholder="Ej: 30" required>
                </div>
                <div class="mb-4">
                    <label class="form-label">Notas</label>
                    <textarea name="notas" class="form-control" rows="2" placeholder="Notas opcionales..."></textarea>
                </div>
                <div class="d-grid">
                    <button type="submit" class="btn btn-dark py-2">Guardar ruta</button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
