{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-7">
        <div class="mb-4">
            <h2 class="mb-1">Nueva sesión</h2>
            <p class="text-muted mb-0" style="font-size:14px">Registra tu entrenamiento de hoy</p>
        </div>

        <div class="card p-4">
            <form method="POST">
                <div class="mb-3">
                    <label class="form-label">Nombre de la sesión</label>
                    <input type="text" name="nombre" class="form-control" placeholder="Ej: Pecho y tríceps" required>
                </div>
                <div class="mb-4">
                    <label class="form-label">Notas</label>
                    <textarea name="notas" class="form-control" rows="2" placeholder="Notas opcionales..."></textarea>
                </div>

                <hr class="my-4">
                <h6 class="mb-3">Ejercicios</h6>

                <div class="row mb-2 d-none d-md-flex">
    <div class="col-md-4"><small class="text-muted">Ejercicio</small></div>
    <div class="col-md-2"><small class="text-muted">Series</small></div>
    <div class="col-md-3"><small class="text-muted">Reps</small></div>
    <div class="col-md-3"><small class="text-muted">Peso (kg)</small></div>
</div>

               <div id="ejercicios">
    <div class="row mb-3 g-2">
        <div class="col-md-4 col-12">
            <input type="text" name="ejercicio_nombre" class="form-control" placeholder="Ejercicio" required>
        </div>
        <div class="col-md-2 col-4">
            <input type="number" name="series" class="form-control" placeholder="Series" required>
        </div>
        <div class="col-md-3 col-4">
            <input type="number" name="repeticiones" class="form-control" placeholder="Reps" required>
        </div>
        <div class="col-md-3 col-4">
            <input type="number" name="peso" class="form-control" placeholder="Peso kg" step="0.5">
        </div>
    </div>
</div>

                <button type="button" class="btn btn-outline-secondary btn-sm mt-2" onclick="añadirEjercicio()">+ Añadir ejercicio</button>

                <div class="d-grid mt-4">
                    <button type="submit" class="btn btn-dark py-2">Guardar sesión</button>
                </div>
            </form>
        </div>
    </div>
</div>

<script>
function añadirEjercicio() {
    const div = document.createElement('div');
    div.className = 'row mb-3 g-2';
    div.innerHTML = `
        <div class="col-md-4 col-12"><input type="text" name="ejercicio_nombre" class="form-control" placeholder="Ejercicio" required></div>
        <div class="col-md-2 col-4"><input type="number" name="series" class="form-control" placeholder="Series" required></div>
        <div class="col-md-3 col-4"><input type="number" name="repeticiones" class="form-control" placeholder="Reps" required></div>
        <div class="col-md-3 col-4"><input type="number" name="peso" class="form-control" placeholder="Peso kg" step="0.5"></div>
    `;
    document.getElementById('ejercicios').appendChild(div);
}
</script>
{% endblock %}
