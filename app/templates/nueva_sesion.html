{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <h2 class="mb-4">Nueva sesión de musculación</h2>
        <form method="POST">
            <div class="mb-3">
                <label class="form-label">Nombre de la sesión</label>
                <input type="text" name="nombre" class="form-control" placeholder="Ej: Pecho y tríceps" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Notas</label>
                <textarea name="notas" class="form-control" rows="3" placeholder="Notas opcionales..."></textarea>
            </div>
            <hr>
            <h5>Ejercicios</h5>
            <div id="ejercicios">
                <div class="row mb-2">
                    <div class="col-md-4">
                        <input type="text" name="ejercicio_nombre" class="form-control" placeholder="Ejercicio" required>
                    </div>
                    <div class="col-md-2">
                        <input type="number" name="series" class="form-control" placeholder="Series" required>
                    </div>
                    <div class="col-md-3">
                        <input type="number" name="repeticiones" class="form-control" placeholder="Reps" required>
                    </div>
                    <div class="col-md-3">
                        <input type="number" name="peso" class="form-control" placeholder="Peso (kg)" step="0.5">
                    </div>
                </div>
            </div>
            <button type="submit" class="btn btn-dark w-100 mt-3">Guardar sesión</button>
        </form>
    </div>
</div>
{% endblock %}
